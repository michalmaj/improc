name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-

      - name: Allow Conan to install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "tools.system.package_manager:mode=install" >> ~/.conan2/global.conf
          echo "tools.system.package_manager:sudo=True"    >> ~/.conan2/global.conf

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libgtk-3-dev libglib2.0-dev

      - name: Configure CMake
        run: |
          cmake \
            -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES="conan_provider.cmake" \
            -DCONAN_COMMAND=$(which conan) \
            -DCMAKE_BUILD_TYPE=Release \
            -B build .

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          ./build/improc_tests \
            --gtest_filter="-VideoWriterTest.WritesToMp4AndCreatesFile:VideoWriterTest.WritesToAvi"
