name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Install GCC 14 (Linux — required for std::ranges::to in C++23)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Remove OpenCV from Conan requirements (use system install)
        run: |
          python3 -c "
          import pathlib
          f = pathlib.Path('conandata.yml')
          f.write_text(''.join(l for l in f.read_text().splitlines(keepends=True) if 'opencv' not in l.lower()))
          "

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ hashFiles('conandata.yml') }}
          restore-keys: conan-${{ matrix.os }}-

      - name: Cache ONNX Runtime download
        uses: actions/cache@v4
        with:
          path: ~/.cmake-fetchcontent
          key: ort-${{ matrix.os }}-1.20.1

      - name: Install system OpenCV (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y --no-install-recommends \
            build-essential libopencv-dev ffmpeg

      - name: Install system OpenCV (macOS)
        if: runner.os == 'macOS'
        run: brew install opencv

      - name: Configure CMake
        run: |
          EXTRA=""
          if [ "$(uname)" = "Darwin" ]; then
            EXTRA="-DCMAKE_PREFIX_PATH=$(brew --prefix)"
          fi
          cmake \
            -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES="conan_provider.cmake" \
            -DCONAN_COMMAND=$(which conan) \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_BASE_DIR=$HOME/.cmake-fetchcontent \
            $EXTRA \
            -B build .

      - name: Build
        run: |
          # Linux runners have 7 GB RAM; unlimited parallel compilation OOMs on
          # heavy visualization TUs. Cap at 2 to stay well within budget.
          if [ "$(uname)" = "Linux" ]; then
            cmake --build build --parallel 2 --target improc_tests
          else
            cmake --build build --parallel --target improc_tests
          fi

      - name: Run tests
        run: |
          ORT_LIB=$(find $HOME/.cmake-fetchcontent -name "libonnxruntime*" -not -name "*.dSYM" | head -1 | xargs dirname 2>/dev/null || true)
          if [ -n "$ORT_LIB" ]; then
            export LD_LIBRARY_PATH="$ORT_LIB:${LD_LIBRARY_PATH:-}"
            export DYLD_LIBRARY_PATH="$ORT_LIB:${DYLD_LIBRARY_PATH:-}"
          fi
          ./build/improc_tests \
            --gtest_filter="-VideoWriterTest.WritesToMp4AndCreatesFile:VideoWriterTest.WritesToAvi"
