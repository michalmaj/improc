name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: pip install "conan>=2,<3"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Remove OpenCV from Conan requirements (use system install)
        run: |
          python3 -c "
          import pathlib
          f = pathlib.Path('conandata.yml')
          f.write_text(''.join(l for l in f.read_text().splitlines(keepends=True) if 'opencv' not in l.lower()))
          "

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ hashFiles('conandata.yml') }}
          restore-keys: conan-${{ matrix.os }}-

      - name: Install system OpenCV (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libopencv-dev ffmpeg

      - name: Install system OpenCV (macOS)
        if: runner.os == 'macOS'
        run: brew install opencv

      - name: Configure CMake
        run: |
          EXTRA=""
          if [ "$(uname)" = "Darwin" ]; then
            EXTRA="-DCMAKE_PREFIX_PATH=$(brew --prefix)"
          fi
          cmake \
            -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES="conan_provider.cmake" \
            -DCONAN_COMMAND=$(which conan) \
            -DCMAKE_BUILD_TYPE=Release \
            $EXTRA \
            -B build .

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          ./build/improc_tests \
            --gtest_filter="-VideoWriterTest.WritesToMp4AndCreatesFile:VideoWriterTest.WritesToAvi"
